apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: node-npm-kaniko-deploy
  namespace: devops-platform
spec:
  params:
    - {name: repo_url, type: string}
    - {name: branch, type: string}
    - {name: image_name, type: string}
    - {name: image_tag, type: string}
    - {name: app_name, type: string}
    - {name: namespace, type: string}
    - {name: container_port, type: string}
    - {name: replicas, type: string}
    - {name: cpu_request, type: string}
    - {name: cpu_limit, type: string}
    - {name: memory_request, type: string}
    - {name: memory_limit, type: string}
    - {name: deploy_strategy, type: string}
    - {name: max_unavailable, type: string}
    - {name: max_surge, type: string}
    - {name: ingress_host, type: string}
    - {name: config_map_name, type: string}
    - {name: secret_name, type: string}
    - {name: registry_secret_name, type: string}
    - {name: kubeconfig_secret_name, type: string}
    - {name: kube_context, type: string}
  workspaces: [{name: source}]
  tasks:
    - name: clone-and-test
      taskSpec:
        params: [{name: repo_url}, {name: branch}]
        workspaces: [{name: source}]
        steps:
          - name: clone
            image: alpine/git:2.45.2
            script: |
              rm -rf $(workspaces.source.path)/*
              git clone --depth=1 --branch "$(params.branch)" "$(params.repo_url)" $(workspaces.source.path)
          - name: npm
            image: node:22-alpine
            workingDir: $(workspaces.source.path)
            script: npm ci && npm run build --if-present
      params:
        - {name: repo_url, value: $(params.repo_url)}
        - {name: branch, value: $(params.branch)}
      workspaces: [{name: source, workspace: source}]
    - name: build-image
      runAfter: [clone-and-test]
      taskSpec:
        params: [{name: image}]
        workspaces: [{name: source}]
        steps:
          - name: kaniko
            image: gcr.io/kaniko-project/executor:v1.23.2
            volumeMounts:
              - {name: docker-config, mountPath: /kaniko/.docker, readOnly: true}
            args: ["--dockerfile=$(workspaces.source.path)/Dockerfile", "--context=$(workspaces.source.path)", "--destination=$(params.image)"]
      params: [{name: image, value: "$(params.image_name):$(params.image_tag)"}]
      workspaces: [{name: source, workspace: source}]
    - name: deploy
      runAfter: [build-image]
      taskSpec:
        params:
          - {name: app}
          - {name: image}
          - {name: namespace}
          - {name: port}
          - {name: replicas}
          - {name: cpu_request}
          - {name: cpu_limit}
          - {name: memory_request}
          - {name: memory_limit}
          - {name: strategy}
          - {name: max_unavailable}
          - {name: max_surge}
          - {name: ingress_host}
          - {name: config_map}
          - {name: secret}
          - {name: registry_secret}
          - {name: kubeconfig_secret_name}
          - {name: kube_context}
        volumes:
          - name: target-kubeconfig
            secret:
              secretName: $(params.kubeconfig_secret_name)
        steps:
          - name: kubectl
            image: docker.io/alpine/k8s:1.31.0
            volumeMounts:
              - name: target-kubeconfig
                mountPath: /var/run/aegis/kubeconfig
                readOnly: true
            script: |
              set -e
              kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" create deployment "$(params.app)" --image="$(params.image)" --dry-run=client -o yaml | kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" apply -f -
              kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" scale deployment "$(params.app)" --replicas="$(params.replicas)"
              kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" set resources deployment "$(params.app)" --requests="cpu=$(params.cpu_request),memory=$(params.memory_request)" --limits="cpu=$(params.cpu_limit),memory=$(params.memory_limit)"
              kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" set env deployment "$(params.app)" --from="configmap/$(params.config_map)"
              kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" set env deployment "$(params.app)" --from="secret/$(params.secret)"
              if [ "$(params.strategy)" = "Recreate" ]; then
                kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" patch deployment "$(params.app)" --type=merge -p '{"spec":{"strategy":{"type":"Recreate","rollingUpdate":null}}}'
              else
                kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" patch deployment "$(params.app)" --type=merge -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxUnavailable":"$(params.max_unavailable)","maxSurge":"$(params.max_surge)"}}}}'
              fi
              if [ -n "$(params.registry_secret)" ]; then
                kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" patch deployment "$(params.app)" --type=merge -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"$(params.registry_secret)"}]}}}}'
              fi
              kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" expose deployment "$(params.app)" --port="$(params.port)" --target-port="$(params.port)" --dry-run=client -o yaml | kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" apply -f -
              if [ -n "$(params.ingress_host)" ]; then
                kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" create ingress "$(params.app)" --rule="$(params.ingress_host)/*=$(params.app):$(params.port)" --dry-run=client -o yaml | kubectl --kubeconfig=/var/run/aegis/kubeconfig/config --context="$(params.kube_context)" -n "$(params.namespace)" apply -f -
              fi
      params:
        - {name: app, value: $(params.app_name)}
        - {name: image, value: "$(params.image_name):$(params.image_tag)"}
        - {name: namespace, value: $(params.namespace)}
        - {name: port, value: $(params.container_port)}
        - {name: replicas, value: $(params.replicas)}
        - {name: cpu_request, value: $(params.cpu_request)}
        - {name: cpu_limit, value: $(params.cpu_limit)}
        - {name: memory_request, value: $(params.memory_request)}
        - {name: memory_limit, value: $(params.memory_limit)}
        - {name: strategy, value: $(params.deploy_strategy)}
        - {name: max_unavailable, value: $(params.max_unavailable)}
        - {name: max_surge, value: $(params.max_surge)}
        - {name: ingress_host, value: $(params.ingress_host)}
        - {name: config_map, value: $(params.config_map_name)}
        - {name: secret, value: $(params.secret_name)}
        - {name: registry_secret, value: $(params.registry_secret_name)}
        - {name: kubeconfig_secret_name, value: $(params.kubeconfig_secret_name)}
        - {name: kube_context, value: $(params.kube_context)}
