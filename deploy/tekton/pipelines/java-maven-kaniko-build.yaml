apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: java-maven-kaniko-build
  namespace: devops-platform
spec:
  params:
    - {name: repo_url, type: string}
    - {name: branch, type: string}
    - {name: commit, type: string}
    - {name: image, type: string}
  workspaces: [{name: source}]
  tasks:
    - name: clone
      taskSpec:
        params: [{name: repo_url}, {name: branch}, {name: commit}]
        workspaces: [{name: source}]
        steps:
          - name: git-clone
            image: alpine/git:2.45.2
            script: rm -rf $(workspaces.source.path)/* && git clone --depth=20 --branch "$(params.branch)" "$(params.repo_url)" $(workspaces.source.path) && git -C $(workspaces.source.path) checkout "$(params.commit)"
      params: [{name: repo_url, value: $(params.repo_url)}, {name: branch, value: $(params.branch)}, {name: commit, value: $(params.commit)}]
      workspaces: [{name: source, workspace: source}]
    - name: package
      runAfter: [clone]
      taskSpec:
        workspaces: [{name: source}]
        steps:
          - name: maven
            image: maven:3.9-eclipse-temurin-17
            workingDir: $(workspaces.source.path)
            script: mvn -B -DskipTests package
      workspaces: [{name: source, workspace: source}]
    - name: build-image
      runAfter: [package]
      taskSpec:
        params: [{name: image}]
        workspaces: [{name: source}]
        steps:
          - name: kaniko
            image: gcr.io/kaniko-project/executor:v1.23.2
            volumeMounts: [{name: docker-config, mountPath: /kaniko/.docker, readOnly: true}]
            args: [--dockerfile=$(workspaces.source.path)/Dockerfile, --context=$(workspaces.source.path), --destination=$(params.image)]
      params: [{name: image, value: $(params.image)}]
      workspaces: [{name: source, workspace: source}]
