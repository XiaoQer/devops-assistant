apiVersion: tekton.dev/v1
kind: Pipeline
metadata: {name: node-npm-deploy-only, namespace: devops-platform}
spec:
  params: [{name: image, type: string}, {name: app, type: string}, {name: namespace, type: string}, {name: port, type: string}, {name: replicas, type: string}, {name: cpu_request, type: string}, {name: cpu_limit, type: string}, {name: memory_request, type: string}, {name: memory_limit, type: string}, {name: deploy_strategy, type: string}, {name: max_unavailable, type: string}, {name: max_surge, type: string}, {name: ingress_host, type: string}, {name: config_map_name, type: string}, {name: env_config_map_name, type: string}, {name: secret_name, type: string}, {name: registry_secret_name, type: string}, {name: kubeconfig_secret_name, type: string}, {name: kube_context, type: string}]
  tasks:
    - name: deploy
      taskSpec:
        params: [{name: image}, {name: app}, {name: namespace}, {name: port}, {name: replicas}, {name: cpu_request}, {name: cpu_limit}, {name: memory_request}, {name: memory_limit}, {name: ingress_host}, {name: config_map_name}, {name: env_config_map_name}, {name: secret_name}, {name: kube_context}, {name: kubeconfig_secret_name}]
        steps:
          - name: kubectl
            image: alpine/k8s:1.31.0
            volumeMounts: [{name: target-kubeconfig, mountPath: /var/run/aegis/kubeconfig, readOnly: true}]
            script: |
              export KUBECONFIG=/var/run/aegis/kubeconfig/config
              kubectl --context="$(params.kube_context)" -n "$(params.namespace)" create deployment "$(params.app)" --image="$(params.image)" --dry-run=client -o yaml | kubectl --context="$(params.kube_context)" -n "$(params.namespace)" apply -f -
              kubectl --context="$(params.kube_context)" -n "$(params.namespace)" scale deployment "$(params.app)" --replicas="$(params.replicas)"
              kubectl --context="$(params.kube_context)" -n "$(params.namespace)" set resources deployment "$(params.app)" --requests="cpu=$(params.cpu_request),memory=$(params.memory_request)" --limits="cpu=$(params.cpu_limit),memory=$(params.memory_limit)"
              kubectl --context="$(params.kube_context)" -n "$(params.namespace)" get configmap "$(params.env_config_map_name)" -o go-template='{{range $key, $value := .data}}{{printf "%s\t%s\n" $key $value}}{{end}}' | while IFS="$(printf '\t')" read -r key value; do
                [ -z "$key" ] || kubectl --context="$(params.kube_context)" -n "$(params.namespace)" set env deployment "$(params.app)" "$key=$value"
              done
              kubectl --context="$(params.kube_context)" -n "$(params.namespace)" set env deployment "$(params.app)" --from=secret/$(params.secret_name)
              kubectl --context="$(params.kube_context)" -n "$(params.namespace)" expose deployment "$(params.app)" --port="$(params.port)" --target-port="$(params.port)" --dry-run=client -o yaml | kubectl --context="$(params.kube_context)" -n "$(params.namespace)" apply -f -
              if [ -n "$(params.ingress_host)" ]; then kubectl --context="$(params.kube_context)" -n "$(params.namespace)" create ingress "$(params.app)" --rule="$(params.ingress_host)/*=$(params.app):$(params.port)" --dry-run=client -o yaml | kubectl --context="$(params.kube_context)" -n "$(params.namespace)" apply -f -; fi
        volumes: [{name: target-kubeconfig, secret: {secretName: $(params.kubeconfig_secret_name), optional: false}}]
      params: [{name: image, value: $(params.image)}, {name: app, value: $(params.app)}, {name: namespace, value: $(params.namespace)}, {name: port, value: $(params.port)}, {name: replicas, value: $(params.replicas)}, {name: cpu_request, value: $(params.cpu_request)}, {name: cpu_limit, value: $(params.cpu_limit)}, {name: memory_request, value: $(params.memory_request)}, {name: memory_limit, value: $(params.memory_limit)}, {name: ingress_host, value: $(params.ingress_host)}, {name: config_map_name, value: $(params.config_map_name)}, {name: env_config_map_name, value: $(params.env_config_map_name)}, {name: secret_name, value: $(params.secret_name)}, {name: kube_context, value: $(params.kube_context)}, {name: kubeconfig_secret_name, value: $(params.kubeconfig_secret_name)}]
